<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root { --fg:#1b1b1d; --bg:#ffffff; --surface:#f4f4f5; --muted:#6b7280; --line:#e4e4e7;
      --display:"Demo Display", Georgia, serif; --body:"Demo Body", system-ui, sans-serif; --color-ink:oklch(0.28 0 0); --color-paper:oklch(0.97 0 0); --color-brand:oklch(0.62 0.16 150); --color-accent-draft:oklch(0.72 0.14 60); }
    * { box-sizing:border-box } body { margin:0; font-family:var(--body); background:var(--bg); color:var(--fg) }
    .pad { padding:40px; max-width:64rem }
    .ey { font-family:var(--display); text-transform:uppercase; letter-spacing:.22em; font-size:.7rem; color:var(--muted); margin:0 0 22px }
    h1,h2 { font-family:var(--display); margin:0 }
    .note { color:var(--muted); font-size:.8rem; margin-top:16px; max-width:46rem }
    .prov { color:var(--muted); font-style:italic }
    .swatches { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:14px }
    .sw { border:1px solid var(--line); border-radius:2px; overflow:hidden }
    .sw .chip { height:96px } .sw .meta { padding:10px 12px; font-size:.78rem }
    .sw .val { color:var(--muted); font-size:.72rem; word-break:break-all }
    .mark-frame svg { width:160px; height:160px; max-width:100% }
    .row { display:flex; gap:14px; align-items:center; flex-wrap:wrap }
    button { font:inherit; font-weight:600; letter-spacing:.02em; border-radius:2px; padding:.8em 1.5em; cursor:pointer }
    input { font:inherit; padding:.7em 1em; border:1px solid var(--line); border-radius:2px; background:var(--surface); color:var(--fg) }
  </style>
</head>
<body>
<div class="pad">
<p class="ey">Components</p>
<div class="row">
  <button style="background:oklch(0.28 0 0);color:oklch(0.97 0 0);border:1px solid transparent">Primary action</button>
  <button style="background:transparent;color:oklch(0.28 0 0);border:1px solid oklch(0.28 0 0)">Secondary</button>
  <button style="background:oklch(0.62 0.16 150);color:oklch(0.28 0 0);border:1px solid transparent">Accent</button>
  <input placeholder="Search" />
</div>
<div class="row" style="margin-top:28px"><div style="flex:1;min-width:180px;border:1px solid var(--line);border-radius:2px;overflow:hidden"><div style="height:48px;display:grid;place-items:center;color:var(--muted);font-size:.75rem">provisional</div><div style="padding:8px 12px;font-size:.78rem;color:var(--muted)">Day <span class="prov">· provisional</span></div></div><div style="flex:1;min-width:180px;border:1px solid var(--line);border-radius:2px;overflow:hidden"><div style="height:48px;display:flex"><span style="flex:1;background:oklch(0.2 0 0)"></span><span style="flex:1;background:oklch(0.95 0 0)"></span></div><div style="padding:8px 12px;font-size:.78rem;color:var(--muted)">Night <span class="prov">· provisional</span></div></div></div>
<p class="note">Components rendered from the palette and colour schemes. A scheme marked <span class="prov">provisional</span> is pending your confirmation.</p>
</div>
</body>
</html>
